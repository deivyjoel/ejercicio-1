<!DOCTYPE html>
<html lang="es">
    <head>
        <meta charset="utf-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <title>Banca Unión</title>
        <link rel="stylesheet" href="styles_inicio_sesion.css">
        <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500&display=swap" rel="stylesheet">
    </head>
    <body>
        <div class="app">
            <h1 class="titulo-banco">Banca Unión</h1>

            <div class="card" id="card-login">
                <h2>Inicio sesión</h2>
                <form id="form-login">
                    <div class="campo">
                        <label for="email">Correo electrónico</label>
                        <input type="email" id="email" name="email" placeholder="ejemplo@correo.com" required>
                    </div>
                    <div class="campo">
                        <label for="password">Contraseña</label>
                        <input type="password" id="password" name="password" placeholder="••••••••" required>
                    </div>
                    <button type="submit" class="btn-primary">Ingresar</button>
                </form>
                <p class="link-cambio">¿No tienes cuenta? <a href="#" onclick="mostrar('registro')">Regístrate</a></p>
            </div>

            <div class="card oculto" id="card-registro">
                <h2>Crear cuenta</h2>
                <form id="form-registro">
                    <div class="campo">
                        <label for="nombre">Nombre completo</label>
                        <input type="text" id="nombre" name="nombre" placeholder="Deivy Torres" required>
                    </div>
                    <div class="campo">
                        <label for="email-reg">Correo electrónico</label>
                        <input type="email" id="email-reg" name="email" placeholder="ejemplo@correo.com" required>
                    </div>
                    <div class="campo">
                        <label for="password-reg">Contraseña</label>
                        <input type="password" id="password-reg" name="password" placeholder="••••••••" required>
                    </div>
                    <button type="submit" class="btn-primary">Crear cuenta</button>
                </form>
                <p class="link-cambio">¿Ya tienes cuenta? <a href="#" onclick="mostrar('login')">Inicia sesión</a></p>
                <script src="login.js"></script>
            </div>
    

        </div>
    </body>
</html>
